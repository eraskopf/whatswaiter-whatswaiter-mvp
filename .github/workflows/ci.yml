name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Node deps
        run: npm install
      - name: Run Node tests
        run: npm test
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r packages/agent-ai/requirements.txt
      - name: Run pytest
        run: pytest packages/agent-ai/tests
